<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XABAR — Yangiliklar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --bg2: #0e1318;
    --bg3: #141b22;
    --bg4: #1a2330;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(99,210,255,0.25);
    --accent: #63d2ff;
    --accent2: #ff6b6b;
    --gold: #f0c040;
    --green: #4ade80;
    --text: #e8edf2;
    --text-muted: #6b7a8d;
    --text-dim: #2e3a46;
    --card-bg: rgba(14,19,24,0.9);
    --success: #4ade80;
    --error: #ff6b6b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(99,210,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,210,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── NAVBAR ─────────────────────────────────────────── */
  .navbar {
    position: sticky;
    top: 0;
    z-index: 200;
    background: rgba(8,12,16,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    gap: 32px;
    height: 64px;
  }

  .nav-brand {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--text);
    text-decoration: none;
    letter-spacing: -0.5px;
    flex-shrink: 0;
  }

  .nav-brand span { color: var(--accent); }

  /* Search */
  .nav-search {
    flex: 1;
    max-width: 400px;
    position: relative;
  }

  .nav-search input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 16px 9px 40px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: all 0.2s;
  }

  .nav-search input::placeholder { color: var(--text-muted); }
  .nav-search input:focus { border-color: var(--accent); background: rgba(99,210,255,0.04); }

  .nav-search::before {
    content: '⌕';
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 18px;
    pointer-events: none;
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-left: auto;
  }

  /* Lang switcher */
  .nav-langs {
    display: flex;
    gap: 4px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 3px;
  }

  .nav-lang {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .nav-lang.active { background: var(--accent); color: #080c10; }

  /* User badge */
  .user-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 6px 16px 6px 8px;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .user-badge:hover { border-color: var(--border-hover); }

  .user-avatar {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, var(--accent), #3b82f6);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: #080c10;
  }

  .user-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .user-role-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 50px;
    text-transform: uppercase;
  }

  .role-user-badge { background: rgba(99,210,255,0.12); color: var(--accent); }
  .role-journalist-badge { background: rgba(240,192,64,0.12); color: var(--gold); }
  .role-admin-badge { background: rgba(255,107,107,0.12); color: var(--error); }

  .btn-logout {
    background: rgba(255,107,107,0.1);
    border: 1px solid rgba(255,107,107,0.2);
    color: var(--error);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-logout:hover { background: rgba(255,107,107,0.2); }

  /* ── CATEGORIES BAR ──────────────────────────────────── */
  .cat-bar {
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--bg2);
    position: relative;
    z-index: 1;
  }

  .cat-bar::-webkit-scrollbar { display: none; }

  .cat-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 14px 18px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }

  .cat-btn:hover { color: var(--text); }

  .cat-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ── MAIN LAYOUT ─────────────────────────────────────── */
  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 40px 32px;
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 40px;
    position: relative;
    z-index: 1;
  }

  /* ── FEATURED / HERO NEWS ────────────────────────────── */
  .featured {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 20px;
    margin-bottom: 8px;
  }

  .featured-main {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
  }

  .featured-main:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  .featured-img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    background: linear-gradient(135deg, var(--bg4) 0%, var(--bg3) 100%);
  }

  .img-placeholder {
    width: 100%;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, var(--bg4), var(--bg3));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
  }

  .featured-body {
    padding: 24px;
  }

  .news-cat-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    margin-bottom: 12px;
    background: rgba(99,210,255,0.12);
    color: var(--accent);
  }

  .news-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .news-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .news-meta .dot { width: 3px; height: 3px; background: var(--text-dim); border-radius: 50%; }

  /* Side featured cards */
  .featured-side {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .mini-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.3s;
    flex: 1;
  }

  .mini-card:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
  }

  .mini-img {
    width: 100%;
    aspect-ratio: 16/7;
    background: linear-gradient(135deg, var(--bg4), var(--bg3));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
  }

  .mini-body { padding: 16px; }

  .mini-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.4;
    margin: 8px 0;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── NEWS GRID ───────────────────────────────────────── */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .news-grid {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* Facebook-style article card */
  .news-card {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.2s;
    animation: fadeUp 0.5s ease both;
    padding: 16px 0;
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }

  .news-card:first-child { border-top: 1px solid var(--border); }

  .news-card:hover {
    background: rgba(255,255,255,0.02);
    padding-left: 8px;
    padding-right: 8px;
    border-radius: 8px;
    border-color: transparent;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Left: text content */
  .card-body {
    flex: 1;
    min-width: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .card-meta-top {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .card-source {
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 11px;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    line-height: 1.35;
    color: var(--text);
    transition: color 0.2s;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin: 0;
  }

  .news-card:hover .card-title { color: var(--accent); }

  .card-excerpt {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    font-weight: 300;
    margin: 0;
  }

  .card-footer {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 4px;
  }

  .card-footer-author {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .card-footer-dot {
    width: 3px; height: 3px;
    background: var(--text-dim);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .card-footer-date {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Right: thumbnail image */
  .card-img-wrap {
    flex-shrink: 0;
    width: 130px;
    height: 86px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--bg4), var(--bg3));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; }

  .views-count {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* Comment count */
  .comment-count {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* ── SIDEBAR ─────────────────────────────────────────── */
  .sidebar { display: flex; flex-direction: column; gap: 24px; }

  .sidebar-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }

  .sidebar-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  /* Journalist create btn */
  .btn-create {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 13px 18px;
    background: rgba(99,210,255,0.1);
    border: 1px solid rgba(99,210,255,0.25);
    border-radius: 12px;
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 10px;
  }

  .btn-create:hover {
    background: rgba(99,210,255,0.18);
    transform: translateY(-1px);
  }

  /* Trending list */
  .trend-item {
    display: flex;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
  }

  .trend-item:last-child { border-bottom: none; padding-bottom: 0; }
  .trend-item:hover .trend-title { color: var(--accent); }

  .trend-num {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 900;
    color: var(--text-dim);
    flex-shrink: 0;
    line-height: 1;
    width: 28px;
    text-align: right;
  }

  .trend-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--text);
    transition: color 0.2s;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── NEWS MODAL ──────────────────────────────────────── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    z-index: 500;
    align-items: flex-start;
    justify-content: center;
    padding: 24px;
    overflow-y: auto;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: #fff;
    border-radius: 16px;
    width: 100%;
    max-width: 680px;
    margin: auto;
    overflow: hidden;
    animation: modalIn 0.3s ease;
    color: #1c1e21;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Cover image at top */
  .modal-cover {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    background: #e4e6ea;
    font-size: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #aaa;
  }

  .modal-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .modal-cover-placeholder {
    width: 100%;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, #e4e6ea 0%, #ccd0d5 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 64px;
  }

  .modal-header {
    padding: 24px 28px 0;
    position: relative;
    border-bottom: none;
  }

  .modal-close {
    position: absolute;
    top: -48px;
    right: 0;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    color: #fff;
    width: 38px; height: 38px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
  }

  .modal-close:hover { background: rgba(255,255,255,0.25); }

  /* Source line */
  .modal-source-line {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .modal-source-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #3b82f6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 800;
    color: #fff;
    flex-shrink: 0;
  }

  .modal-source-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .modal-source-name {
    font-size: 14px;
    font-weight: 700;
    color: #1c1e21;
  }

  .modal-source-meta {
    font-size: 12px;
    color: #65676b;
  }

  .modal-cat-pill {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 4px;
    background: rgba(99,210,255,0.12);
    color: var(--accent);
    margin-bottom: 10px;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 900;
    line-height: 1.25;
    color: #1c1e21;
    margin-bottom: 18px;
  }

  .modal-divider {
    height: 1px;
    background: #e4e6ea;
    margin: 0 28px;
  }

  .modal-body {
    padding: 20px 28px 28px;
  }

  .modal-content {
    font-size: 16px;
    color: #444950;
    line-height: 1.85;
    font-weight: 400;
    margin-bottom: 28px;
    font-family: 'Georgia', serif;
  }

  /* Comment section */
  .comments-section {
    border-top: 1px solid #e4e6ea;
    padding-top: 20px;
  }

  .comments-title {
    font-size: 16px;
    font-weight: 700;
    color: #1c1e21;
    margin-bottom: 16px;
  }

  .comment-item {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }

  .comment-avatar {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #e4e6ea, #ccd0d5);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
    border: 1px solid #e4e6ea;
  }

  .comment-bubble {
    background: #f0f2f5;
    border-radius: 16px;
    padding: 10px 14px;
    flex: 1;
  }

  .comment-author { font-size: 13px; font-weight: 700; color: #1c1e21; margin-bottom: 2px; }
  .comment-text { font-size: 13px; color: #444950; line-height: 1.45; }

  .comment-input-wrap {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    align-items: center;
  }

  .comment-input {
    flex: 1;
    background: #f0f2f5;
    border: none;
    border-radius: 20px;
    padding: 10px 16px;
    color: #1c1e21;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: all 0.2s;
  }

  .comment-input::placeholder { color: #8a8d91; }
  .comment-input:focus { background: #e4e6ea; }

  .comment-send {
    background: var(--accent);
    border: none;
    border-radius: 20px;
    color: #080c10;
    font-weight: 700;
    font-size: 13px;
    padding: 10px 18px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .comment-send:hover { background: #8ee4ff; }

  /* ── JOURNALIST PANEL ────────────────────────────────── */
  .j-panel { display: none; }
  .j-panel.visible { display: flex; flex-direction: column; gap: 10px; }

  /* ── LOADING / EMPTY ─────────────────────────────────── */
  .loading-wrap {
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 80px 0;
    color: var(--text-muted);
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 0;
    color: var(--text-muted);
    font-size: 15px;
  }

  /* Load more */
  .load-more-wrap { text-align: center; margin-top: 32px; }

  .btn-load-more {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 12px 32px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-load-more:hover { border-color: var(--border-hover); color: var(--text); }

  /* Responsive */
  @media (max-width: 1100px) {
    .container { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .featured { grid-template-columns: 1fr 1fr; }
    .featured-side { flex-direction: row; }
  }

  @media (max-width: 700px) {
    .navbar { padding: 0 16px; gap: 12px; }
    .nav-search { display: none; }
    .container { padding: 24px 16px; }
    .featured { grid-template-columns: 1fr; }
    .featured-side { display: none; }
    .news-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="/" class="nav-brand">XA<span>BAR</span></a>

  <div class="nav-search">
    <input type="text" id="search-input" placeholder="Qidirish..." oninput="onSearch(this.value)">
  </div>

  <div class="nav-right">
    <div class="nav-langs">
      <button class="nav-lang active" onclick="setLang('uz')">UZ</button>
      <button class="nav-lang" onclick="setLang('ru')">RU</button>
      <button class="nav-lang" onclick="setLang('en')">EN</button>
    </div>

    <a href="/profile/" class="user-badge" id="user-badge">
      <div class="user-avatar" id="user-avatar">?</div>
      <span class="user-name" id="user-name">...</span>
      <span class="user-role-badge role-user-badge" id="user-role-badge"></span>
    </a>

    <button class="btn-logout" onclick="logout()" data-i18n="logout">Chiqish</button>
  </div>
</nav>

<!-- CATEGORIES BAR -->
<div class="cat-bar" id="cat-bar">
  <button class="cat-btn active" onclick="filterCat(null, this)" data-i18n="all">Barchasi</button>
</div>

<!-- MAIN -->
<div class="container">

  <!-- News feed -->
  <div>
    <div class="section-title" data-i18n="latest">So'nggi yangiliklar</div>
    <div class="news-grid" id="news-grid">
      <div class="loading-wrap" style="grid-column:1/-1">
        <div class="spinner"></div>
        <span data-i18n="loading">Yuklanmoqda...</span>
      </div>
    </div>
    <div class="load-more-wrap" id="load-more-wrap" style="display:none">
      <button class="btn-load-more" onclick="loadMore()" data-i18n="load-more">Ko'proq ko'rish</button>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">

    <!-- Journalist panel -->
    <div class="sidebar-card j-panel" id="j-panel">
      <div class="sidebar-title" data-i18n="my-panel">Mening panel</div>
      <button class="btn-create" onclick="window.location.href='/yangilik/'" data-i18n="create-news">✏️ Yangilik yaratish</button>
      <button class="btn-create" onclick="window.location.href='/profile/#articles'" style="background:rgba(240,192,64,0.08);border-color:rgba(240,192,64,0.2);color:var(--gold)" data-i18n="my-news">📋 Mening yangiliklarим</button>
    </div>

    <!-- Trending -->
    <div class="sidebar-card">
      <div class="sidebar-title" data-i18n="trending">Trendda</div>
      <div id="trending-list">
        <div style="color:var(--text-muted);font-size:13px">Yuklanmoqda...</div>
      </div>
    </div>

  </div>
</div>

<!-- NEWS MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" style="position:relative;">
    <button class="modal-close" onclick="closeNewsModal()">✕</button>
    <!-- Cover image -->
    <div id="modal-cover-wrap" class="modal-cover-placeholder">📰</div>

    <div class="modal-header">
      <span class="modal-cat-pill" id="modal-cat"></span>
      <div class="modal-title" id="modal-title"></div>
      <!-- Source / author line -->
      <div class="modal-source-line">
        <div class="modal-source-icon" id="modal-source-icon">X</div>
        <div class="modal-source-info">
          <span class="modal-source-name" id="modal-author"></span>
          <span class="modal-source-meta">
            <span id="modal-date"></span> · <span id="modal-views"></span>
          </span>
        </div>
      </div>
    </div>
    <div class="modal-divider"></div>
    <div class="modal-body">
      <div class="modal-content" id="modal-content"></div>

      <!-- Comments -->
      <div class="comments-section">
        <div class="comments-title" data-i18n="comments">Izohlar</div>
        <div id="comments-list"></div>

        <!-- Only user role can comment -->
        <div id="comment-form-wrap" style="display:none">
          <div class="comment-input-wrap">
            <input class="comment-input" id="comment-input" placeholder="Izoh yozing..." data-ph="comment-ph">
            <button class="comment-send" onclick="sendComment()" data-i18n="send">Yuborish</button>
          </div>
        </div>
        <div id="comment-blocked-msg" style="display:none;font-size:13px;color:#65676b;margin-top:12px" data-i18n="comment-journalist-note">Jurnalistlar izoh yoza olmaydi.</div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── i18n ───────────────────────────────────────────────
const LANGS = {
  uz: {
    'all':'Barchasi','latest':'So\'nggi yangiliklar','loading':'Yuklanmoqda...',
    'load-more':'Ko\'proq ko\'rish','trending':'Trendda','my-panel':'Mening panel',
    'create-news':'✏️ Yangilik yaratish','my-news':'📋 Mening yangiliklarim',
    'logout':'Chiqish','comments':'Izohlar','send':'Yuborish',
    'comment-ph':'Izoh yozing...','no-news':'Yangiliklar topilmadi.',
    'comment-journalist-note':'Jurnalistlar izoh yoza olmaydi.',
    'views':'ko\'rishlar','read-more':'Batafsil o\'qish',
  },
  ru: {
    'all':'Все','latest':'Последние новости','loading':'Загрузка...',
    'load-more':'Загрузить ещё','trending':'В тренде','my-panel':'Моя панель',
    'create-news':'✏️ Написать новость','my-news':'📋 Мои новости',
    'logout':'Выйти','comments':'Комментарии','send':'Отправить',
    'comment-ph':'Напишите комментарий...','no-news':'Новости не найдены.',
    'comment-journalist-note':'Журналисты не могут оставлять комментарии.',
    'views':'просмотров','read-more':'Читать далее',
  },
  en: {
    'all':'All','latest':'Latest news','loading':'Loading...',
    'load-more':'Load more','trending':'Trending','my-panel':'My panel',
    'create-news':'✏️ Write article','my-news':'📋 My articles',
    'logout':'Sign out','comments':'Comments','send':'Send',
    'comment-ph':'Write a comment...','no-news':'No news found.',
    'comment-journalist-note':'Journalists cannot leave comments.',
    'views':'views','read-more':'Read more',
  }
};

let currentLang = 'uz';

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.nav-lang').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === lang));
  const L = LANGS[lang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (L[key]) el.textContent = L[key];
  });
  document.querySelectorAll('[data-ph]').forEach(el => {
    const key = el.dataset.ph;
    if (L[key]) el.placeholder = L[key];
  });
}

// ─── Auth state ─────────────────────────────────────────
const token    = localStorage.getItem('access');
const userRole = localStorage.getItem('role') || 'user';
const userName = localStorage.getItem('username') || '?';

if (!token) window.location.href = '/';

// Setup user badge
document.getElementById('user-name').textContent = userName;
document.getElementById('user-avatar').textContent = userName[0].toUpperCase();

const roleBadge = document.getElementById('user-role-badge');
const roleLabels = { user: {uz:'Foydalanuvchi',ru:'Читатель',en:'Reader'}, journalist: {uz:'Jurnalist',ru:'Журналист',en:'Journalist'}, admin: {uz:'Admin',ru:'Админ',en:'Admin'} };
roleBadge.textContent = (roleLabels[userRole] || roleLabels.user)[currentLang] || userRole;
roleBadge.className = 'user-role-badge role-' + userRole + '-badge';

// Show journalist panel
if (userRole === 'journalist' || userRole === 'admin') {
  document.getElementById('j-panel').classList.add('visible');
}

function logout() {
  const refresh = localStorage.getItem('refresh');
  if (refresh) {
    fetch(API_BASE_URL + '/api/auth/logout/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ refresh })
    }).finally(() => {
      localStorage.clear();
      window.location.href = '/';
    });
  } else {
    localStorage.clear();
    window.location.href = '/';
  }
}

// ─── Data ───────────────────────────────────────────────
let allNews      = [];
let featuredNews = [];
let currentPage  = 1;
let currentCat   = null;
let searchQuery  = '';
let currentNewsId = null;

const API_BASE_URL = window.location.origin;

function getHeaders() {
  const hdrs = { 'Content-Type': 'application/json' };
  if (token) hdrs.Authorization = 'Bearer ' + token;
  return hdrs;
}

function fmtDate(d) {
  return new Date(d).toLocaleDateString(currentLang === 'uz' ? 'uz-UZ' : currentLang === 'ru' ? 'ru-RU' : 'en-US', { day:'numeric', month:'short', year:'numeric' });
}

// ─── Load categories ─────────────────────────────────────
async function loadCategories() {
  try {
    const res  = await fetch(API_BASE_URL + '/api/categories/', { headers: getHeaders() });
    const data = await res.json();
    const bar  = document.getElementById('cat-bar');
    data.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'cat-btn';
      btn.textContent = cat.name;
      btn.onclick = () => filterCat(cat.slug, btn);
      bar.appendChild(btn);
    });
  } catch {}
}

function filterCat(slug, btn) {
  currentCat  = slug;
  currentPage = 1;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadNews(true);
}

// ─── Load news ────────────────────────────────────────────
async function loadNews(reset = false) {
  if (reset) { allNews = []; currentPage = 1; }

  const grid = document.getElementById('news-grid');
  if (reset) grid.innerHTML = `<div class="loading-wrap" style="grid-column:1/-1"><div class="spinner"></div></div>`;

  let url = `${API_BASE_URL}/api/news/?page=${currentPage}`;
  if (currentCat)   url += `&category=${currentCat}`;
  if (searchQuery)  url += `&search=${encodeURIComponent(searchQuery)}`;

  try {
    const res  = await fetch(url, { headers: getHeaders() });
    if (res.status === 401) { localStorage.clear(); window.location.href = '/'; return; }
    const data = await res.json();

    const results = data.results || data;
    const hasNext = !!data.next;

    allNews = reset ? results : [...allNews, ...results];

    renderNews(results, reset);

    document.getElementById('load-more-wrap').style.display = hasNext ? 'block' : 'none';
    currentPage++;
  } catch {
    grid.innerHTML = `<div class="empty-state">Server bilan bog'lanishda xatolik.</div>`;
  }
}

function renderNews(items, reset) {
  const grid = document.getElementById('news-grid');
  if (reset) grid.innerHTML = '';

  if (!items.length && reset) {
    grid.innerHTML = `<div class="empty-state">${LANGS[currentLang]['no-news']}</div>`;
    return;
  }

  const emojis = ['📰','📄','🗞️','📝','🔖','📊','🌍','💡'];

  items.forEach((n, idx) => {
    const card = document.createElement('div');
    card.className = 'news-card';
    card.style.animationDelay = (idx * 0.08) + 's';

    const excerpt = n.content ? n.content.substring(0, 100) + '...' : '';
    const imageUrl = n.image
      ? (n.image.startsWith('http') ? n.image : API_BASE_URL + n.image)
      : null;
    card.innerHTML = `
      <div class="card-body">
        <div class="card-meta-top">
          <span class="card-source">${n.category?.name || 'Yangilik'}</span>
        </div>
        <div class="card-title">${n.title}</div>
        <div class="card-excerpt">${excerpt}</div>
        <div class="card-footer">
          <span class="card-footer-author">${n.author_name || ''}</span>
          ${n.author_name ? '<span class="card-footer-dot"></span>' : ''}
          <span class="card-footer-date">${fmtDate(n.created_at)}</span>
          <span class="card-footer-dot"></span>
          <span class="views-count">👁 ${n.views_count || 0}</span>
        </div>
      </div>
      <div class="card-img-wrap">
        ${imageUrl ? `<img src="${imageUrl}" alt="${n.title}" onerror="this.parentElement.innerHTML='${emojis[idx%8]}'">` : emojis[idx % 8]}
      </div>
    `;
    card.onclick = () => openNews(n);
    grid.appendChild(card);
  });

  // Update trending list
  if (reset) {
    const trendEl = document.getElementById('trending-list');
    trendEl.innerHTML = allNews.slice(0, 5).map((n, i) => `
      <div class="trend-item" onclick="openNews(${JSON.stringify(n).replace(/"/g, '&quot;')})">
        <div class="trend-num">${i + 1}</div>
        <div class="trend-title">${n.title}</div>
      </div>
    `).join('');
  }
}

function loadMore() { loadNews(false); }

let searchTimer;
function onSearch(val) {
  searchQuery = val;
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => loadNews(true), 400);
}

// ─── News modal ──────────────────────────────────────────
async function openNews(news) {
  if (!news) return;
  currentNewsId = news.id;

  // Show modal immediately with initial data
  document.getElementById('modal-cat').textContent     = news.category?.name || 'Yangilik';
  document.getElementById('modal-title').textContent   = news.title;
  const authorName = news.author_name || 'XABAR';
  document.getElementById('modal-author').textContent  = authorName;
  document.getElementById('modal-source-icon').textContent = authorName[0]?.toUpperCase() || 'X';
  document.getElementById('modal-date').textContent    = fmtDate(news.created_at);
  document.getElementById('modal-views').textContent   = '👁 ' + (news.views_count || 0);
  document.getElementById('modal-content').textContent = 'Yuklanmoqda...';

  // Cover image
  const coverWrap = document.getElementById('modal-cover-wrap');
  if (news.image) {
    const imgUrl = news.image.startsWith('http') ? news.image : API_BASE_URL + news.image;
    coverWrap.innerHTML = `<img src="${imgUrl}" alt="${news.title}" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.parentElement.innerHTML='📰';this.parentElement.style.fontSize='64px'">`;
    coverWrap.className = 'modal-cover';
    coverWrap.style.cssText = 'width:100%;aspect-ratio:16/9;overflow:hidden;';
  } else {
    coverWrap.innerHTML = '📰';
    coverWrap.className = 'modal-cover-placeholder';
    coverWrap.style.cssText = '';
  }

  // Comment form visibility
  document.getElementById('comment-form-wrap').style.display   = userRole === 'user' ? 'block' : 'none';
  document.getElementById('comment-blocked-msg').style.display = userRole !== 'user' ? 'block' : 'none';

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Fetch full news details to get content
  try {
    const res = await fetch(`${API_BASE_URL}/api/news/${news.id}/`, { headers: getHeaders() });
    if (res.ok) {
      const fullNews = await res.json();
      document.getElementById('modal-content').textContent = fullNews.content || '';
      document.getElementById('modal-views').textContent = '👁 ' + (fullNews.views_count || 0);
    } else {
      document.getElementById('modal-content').textContent = news.content || 'Yangilik yuklanmadi';
    }
  } catch (err) {
    document.getElementById('modal-content').textContent = news.content || 'Yangilik yuklanmadi';
  }

  await loadComments(news.id);
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeNewsModal();
}

function closeNewsModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  currentNewsId = null;
}

// ─── Comments ────────────────────────────────────────────
async function loadComments(newsId) {
  const list = document.getElementById('comments-list');
  list.innerHTML = '<div style="color:var(--text-muted);font-size:13px">Yuklanmoqda...</div>';
  try {
    const res  = await fetch(`${API_BASE_URL}/api/news/${newsId}/comments/`, { headers: getHeaders() });
    if (res.status === 401) {
      localStorage.clear();
      window.location.href = '/';
      return;
    }
    const data = await res.json();
    const items = data.results || data;

    if (!items.length) {
      list.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:8px 0">Hali izoh yo\'q.</div>';
      return;
    }

    list.innerHTML = items.map(c => `
      <div class="comment-item">
        <div class="comment-avatar">${c.author_name?.[0]?.toUpperCase() || '?'}</div>
        <div class="comment-bubble">
          <div class="comment-author">${c.author_name || 'Foydalanuvchi'}</div>
          <div class="comment-text">${c.text}</div>
        </div>
      </div>
    `).join('');
  } catch {
    list.innerHTML = '<div style="color:var(--error);font-size:13px">Izohlarni yuklashda xatolik.</div>';
  }
}

async function sendComment() {
  const input = document.getElementById('comment-input');
  const text  = input.value.trim();
  if (!text || !currentNewsId) return;

  try {
    const res = await fetch(API_BASE_URL + '/api/comments/create/', {
      method: 'POST',
      headers: getHeaders(),
      body: JSON.stringify({ news: currentNewsId, text })
    });
    if (res.status === 401) {
      localStorage.clear();
      window.location.href = '/';
      return;
    }
    if (res.ok) {
      input.value = '';
      await loadComments(currentNewsId);
    }
  } catch {
    console.error('Comment submission failed');
  }
}

// ─── Init ────────────────────────────────────────────────
loadCategories();
loadNews(true);
</script>
</body>
</html>

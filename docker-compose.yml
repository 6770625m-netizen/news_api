version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: news_api_db
    environment:
      POSTGRES_DB: news_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - news_network   # ✅ BU QATOR YETISHMAYOTGAN EDI

  web:
    build: .
    container_name: news_api_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DEBUG: 'True'
      SECRET_KEY: 'your-secret-key-change-in-production'
      ALLOWED_HOSTS: 'localhost,127.0.0.1,web,web:8000'
      DATABASE_URL: 'postgresql://postgres:postgres123@db:5432/news_db'
      DB_ENGINE: 'django.db.backends.postgresql'
      DB_NAME: 'news_db'
      DB_USER: 'postgres'
      DB_PASSWORD: 'postgres123'
      DB_HOST: 'db'
      DB_PORT: '5432'
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - news_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  news_network:
    driver: bridge